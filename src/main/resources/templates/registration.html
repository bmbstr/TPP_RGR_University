<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Реєстрація</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .register-card {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 15px;
        }
    </style>
</head>

<body>
    <div class="card register-card shadow-lg border-0">
        <div class="card-body">
            <h3 class="text-center mb-4 fw-bold text-primary">Створити акаунт</h3>
            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label class="form-label">Логін</label>
                    <input type="text" name="username" class="form-control" placeholder="Введіть логін" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control" placeholder="Мінімум 6 символів"
                        required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3">Зареєструватися</button>
            </form>
            <div class="text-center">
                <p class="mb-0 text-muted">Вже маєте акаунт?
                    <a th:href="@{/login}" class="text-decoration-none fw-bold">Увійти</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
