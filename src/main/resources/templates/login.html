<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Вхід у систему</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
        }
    </style>
</head>

<body>
    <div class="card login-card shadow-lg border-0">
        <div class="card-body p-4">
            <h3 class="text-center mb-4 fw-bold text-dark">Авторизація</h3>

            <div th:if="${param.registered}" class="alert alert-success small">
                Ви успішно зареєстровані! Тепер увійдіть.
            </div>

            <div th:if="${param.error}" class="alert alert-danger small">
                Невірний логін або пароль.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Логін</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Увійти</button>
            </form>

            <div class="text-center mt-3">
                <p class="mb-0 text-muted small">Ще не маєте акаунту?
                    <a th:href="@{/register}" class="text-decoration-none fw-bold">Зареєструватися</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
