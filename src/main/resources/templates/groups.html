<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Groups Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-5" style="background-color: #b1a2f2;">
    <div class="container bg-white p-4 rounded shadow">
        <h2 class="mb-4">Управління групами 🏫</h2>

        <div class="card mb-4">
            <div class="card-header bg-success text-white">Створити нову групу</div>
            <div class="card-body">
                <form th:action="@{/groups/add}" method="post" class="row g-3">
                    <div class="col-md-9">
                        <input type="text" name="groupName" class="form-control" placeholder="Назва групи (напр. KI-223)" required>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-success w-100">Додати</button>
                    </div>
                </form>
            </div>
        </div>

        <table class="table table-hover mt-3">
            <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Group Name</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="g : ${groups}">
                    <td th:text="${g.id}"></td>
                    <td th:text="${g.groupName}"></td>
                    <td>
                        <a th:href="@{/groups/delete/{id}(id=${g.id})}" 
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Ви впевнені?')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div class="mt-4">
            <a href="/" class="btn btn-secondary">Back to Home</a>
        </div>
    </div>
</body>
</html>
