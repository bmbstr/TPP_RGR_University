<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Students</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-5" style="background-color: #b1a2f2;">
    <div class="container bg-white p-4 rounded shadow">
        <h2 class="mb-4">Управління студентами</h2>
        
        <div class="card mb-4 border-success">
            <div class="card-body">
                <form th:action="@{/students/add}" method="post" class="row g-3">
                    <div class="col-md-3"><input type="text" name="firstName" class="form-control" placeholder="Ім'я" required></div>
                    <div class="col-md-3"><input type="text" name="lastName" class="form-control" placeholder="Прізвище" required></div>
                    <div class="col-md-3"><input type="number" name="groupId" class="form-control" placeholder="ID групи" required></div>
                    <div class="col-md-3"><button type="submit" class="btn btn-success w-100">Додати</button></div>
                </form>
            </div>
        </div>

        <form th:action="@{/search}" method="get" class="mb-4">
            <div class="input-group">
                <input type="text" name="lastName" class="form-control" placeholder="Пошук за прізвищем...">
                <button class="btn btn-primary" type="submit">Знайти</button>
            </div>
        </form>

        <table class="table table-hover" th:if="${students != null}">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Ім'я</th>
                    <th>Прізвище</th>
                    <th>Дія</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${students}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.firstName}"></td>
                    <td th:text="${s.lastName}"></td>
                    <td><a th:href="@{/students/delete/{id}(id=${s.id})}" class="btn btn-danger btn-sm">Видалити</a></td>
                </tr>
            </tbody>
        </table>
        <a href="/" class="btn btn-secondary mt-3">На головну</a>
    </div>
</body>
</html>
