<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>University System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-5" style="background-color: #b1a2f2;">
    <div class="container bg-white p-5 rounded shadow text-center">
        <h1 class="mb-4">University System 🎓</h1>
        <div class="d-grid gap-3 d-md-flex justify-content-center">
            <a th:href="@{/search}" class="btn btn-primary btn-lg px-4">Students</a>
            <a th:href="@{/groups}" class="btn btn-success btn-lg px-4">Groups</a>
            <a th:href="@{/courses}" class="btn btn-info btn-lg px-4 text-white">Courses</a>
            <a th:href="@{/grades}" class="btn btn-warning btn-lg px-4 text-white">Grades</a>
        </div>
        <hr class="my-4">
        <p class="text-muted">Дані завантажуються з бази PostgreSQL</p>
    </div>
</body>
</html>
