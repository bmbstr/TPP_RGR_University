<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Courses</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-5" style="background-color: #b1a2f2;">
    <div class="container bg-white p-4 rounded shadow">
        <h2>Управління курсами 📚</h2>
        
        <form th:action="@{/courses/add}" method="post" class="my-4 row g-3">
            <div class="col-auto"><input type="text" name="name" class="form-control" placeholder="Назва курсу" required></div>
            <div class="col-auto"><button type="submit" class="btn btn-success">Додати курс</button></div>
        </form>

        <table class="table table-hover">
            <thead class="table-info">
                <tr>
                    <th>ID</th>
                    <th>Course Name</th>
                    <th>Дія</th>
                </tr>
            </thead>
            <tbody>
               <tr th:each="c : ${courses}">
    <td th:text="${c.id}"></td>
    <td th:text="${c.name}"></td>
    <td><a th:href="@{/courses/delete/{id}(id=${c.id})}" class="btn btn-danger btn-sm">Delete</a></td>
</tr>
            </tbody>
        </table>
        <a href="/" class="btn btn-secondary">На головну</a>
    </div>
</body>
</html>
