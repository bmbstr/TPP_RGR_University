<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Помилка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-code {
            font-size: 100px;
            font-weight: bold;
            color: #dc3545;
        }
    </style>
</head>

<body class="text-center">
    <div class="card shadow-lg p-5 border-0" style="max-width: 500px; border-radius: 20px;">
        <div class="error-code" th:text="${status != null ? status : 'Упс!'}">404</div>
        <h2 class="fw-bold mb-3">Сталася помилка</h2>

        <p class="text-muted mb-4" th:switch="${status}">
            <span th:case="404">Сторінку не знайдено. Можливо, вона була видалена або адреса невірна.</span>
            <span th:case="403">Доступ заборонено! У вас недостатньо прав для цієї дії.</span>
            <span th:case="401">Ви не авторизовані. Будь ласка, увійдіть у систему.</span>
            <span th:case="*">Виникла неочікувана внутрішня помилка сервера.</span>
        </p>

        <a href="/" class="btn btn-primary btn-lg shadow-sm">На головну сторінку</a>
    </div>
</body>

</html>
