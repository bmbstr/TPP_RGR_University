<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Журнал успішності</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">← На головну</a>
            <span class="navbar-text text-white">
                Ви увійшли як: <strong sec:authentication="name"></strong>
            </span>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="card shadow-sm border-0 mb-4" sec:authorize="hasRole('ADMIN')">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0">➕ Виставити нову оцінку</h5>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/grades/add}" method="post" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Студент</label>
                        <select name="studentId" class="form-select" required>
                            <option value="" disabled selected>Виберіть студента...</option>
                            <option th:each="s : ${students}" th:value="${s.id}"
                                th:text="${s.lastName + ' ' + s.firstName}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Курс</label>
                        <select name="courseId" class="form-select" required>
                            <option value="" disabled selected>Виберіть предмет...</option>
                            <option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-bold">Оцінка</label>
                        <input type="number" name="score" class="form-control" min="0" max="100" required>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-success w-100 fw-bold shadow-sm">Зберегти</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h2 class="text-center mb-4 text-dark text-uppercase fw-bold">Електронний журнал</h2>
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th style="width: 80px;">ID</th>
                            <th>Прізвище та Ім'я</th>
                            <th>Назва курсу</th>
                            <th class="text-center">Оцінка</th>
                            <th sec:authorize="hasRole('ADMIN')" class="text-center">Дії</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="g : ${grades}">
                            <td th:text="${g.id}" class="text-muted small"></td>
                            <td th:text="${g.studentFullName}" class="fw-bold text-secondary"></td>
                            <td th:text="${g.courseName}"></td>
                            <td class="text-center">
                                <span class="badge bg-primary fs-6 px-3" th:text="${g.grade}"></span>
                            </td>
                            <td sec:authorize="hasRole('ADMIN')" class="text-center">
                                <a th:href="@{'/grades/delete/' + ${g.id}}"
                                    class="btn btn-outline-danger btn-sm shadow-sm"
                                    onclick="return confirm('Видалити цей запис?')">
                                    🗑 Видалити
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>

</html>
