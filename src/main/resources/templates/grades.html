<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Grades</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-5" style="background-color: #b1a2f2;">
    <div class="container bg-white p-4 rounded shadow">
        <h2>Журнал оцінок ⭐</h2>

        <form th:action="@{/grades/add}" method="post" class="my-4 row g-3">
            <div class="col-auto"><input type="number" name="studentId" class="form-control" placeholder="ID Студента" required></div>
            <div class="col-auto"><input type="number" name="courseId" class="form-control" placeholder="ID Курсу" required></div>
            <div class="col-auto"><input type="number" name="score" class="form-control" placeholder="Оцінка" required></div>
            <div class="col-auto"><button type="submit" class="btn btn-success">Поставити</button></div>
        </form>

        <table class="table table-hover">
            <thead class="table-warning">
                <tr><th>ID</th><th>Student ID</th><th>Course ID</th><th>Оцінка</th><th>Дія</th></tr>
            </thead>
            <tbody>
                <tr th:each="gr : ${grades}">
                    <td th:text="${gr.id}"></td>
                    <td th:text="${gr.studentId}"></td>
                    <td th:text="${gr.courseId}"></td>
                    <td th:text="${gr.grade}"></td>
                    <td><a th:href="@{/grades/delete/{id}(id=${gr.id})}" class="btn btn-danger btn-sm">Delete</a></td>
                </tr>
            </tbody>
        </table>
        <a href="/" class="btn btn-secondary mt-3">На головну</a>
    </div>
</body>
</html>
